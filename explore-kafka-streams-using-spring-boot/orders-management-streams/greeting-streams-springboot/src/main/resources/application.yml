spring:
  application:
    name: greeting-kafka-streams
  profiles:
    active:
    - local

---
spring:
  config:
    activate:
      on-profile:
      - local
  kafka:
    streams:
      bootstrap-servers:
      - localhost:9092
      application-id: greeting-kafka-streams
    properties:
      default:
        deserialization:
          exception:
            handler: com.learnkafkastreams.greeting_streams_springboot.exceptionhandler.StreamDeserializationExceptionHandler